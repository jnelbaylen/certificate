<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Menu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <div class="row">

            <div class="col-md-6">
                <h1 class="alert alert-primary">Our Menu</h1>

                <div class="card mb-3">
                    <img src="../assets/falafel.png" class="card-img-top img-fluid" alt="falafel">
                    <div class="card-body">
                        <h5 class="card-title">Falafel</h5>
                        <p class="card-text">Chickpea, herbs and spices</p>
                    </div>
                </div>

                <div class="card mb-3">
                    <img src="../assets/salad.png" class="card-img-top img-fluid" alt="salad">
                    <div class="card-body">
                        <h5 class="card-title">Pasta Salad</h5>
                        <p class="card-text">Lettuce, vegetable and mozzarella</p>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <h2 class="mb-3">Prices</h2>
                <table class="table table-striped table-bordered">
                    <thead class="table-dark">
                        <tr>
                            <th>Item</th>
                            <th>Price</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Falafel</td>
                            <td>$12.00</td>
                        </tr>
                        <tr>
                            <td>Pasta Salad</td>
                            <td>$10.00</td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
